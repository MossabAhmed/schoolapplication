{% extends 'base.html' %}

{% block title %}قائمة المعلمين{% endblock %}

{% block content %}
<div class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
    <h1 class="text-3xl font-bold text-gray-800">قائمة المعلمين</h1>
    <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto">
        <div class="relative w-full md:w-64">
            <input type="text" name="q" placeholder="ابحث عن معلم..." 
                   value="{{ query }}"
                   hx-get="{% url 'admin_teachers_list' %}" 
                   hx-trigger="keyup changed delay:500ms, search" 
                   hx-target="#teachers-tbody" 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
        <a href="{% url 'admin_add_teacher' %}" class="bg-indigo-600 text-white px-4 py-2 w-full md:w-auto text-center rounded-lg hover:bg-indigo-700 transition font-semibold whitespace-nowrap">
            + إضافة معلم جديد
        </a>
    </div>
</div>

<div class="bg-white rounded-xl shadow overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full text-sm text-right text-gray-500">
            <thead class="text-xs text-gray-700 uppercase bg-gray-50 border-b">
                <tr>
                    <th scope="col" class="px-6 py-3">الاسم الكامل</th>
                    <th scope="col" class="px-6 py-3">اسم المستخدم</th>
                    <th scope="col" class="px-6 py-3">المواد</th>
                    <th scope="col" class="px-6 py-3">الحالة (حظر/تفعيل)</th>
                    <th scope="col" class="px-6 py-3">إجراءات</th>
                </tr>
            </thead>
            <tbody id="teachers-tbody">
                {% include 'school/admin/partials/teachers_table_rows.html' %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
