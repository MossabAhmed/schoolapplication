<!-- شريط البحث (داخل المكون ليحتفظ بـ section_id) -->
<div class="bg-white p-4 rounded-xl shadow mb-6 flex items-center justify-between">
    <div class="relative w-full max-w-md">
        <input type="text" name="q" placeholder="ابحث عن طالب..." 
               value="{{ query }}"
               hx-get="{% url 'admin_get_students' %}" 
               hx-include="[name='section_id']"
               hx-trigger="keyup changed delay:500ms, search" 
               hx-target="#students-tbody" 
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
        <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input type="hidden" name="section_id" value="{{ section_id|default:'' }}">
    </div>
    {% if section_id %}
    <span class="text-sm font-medium text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">الطلاب المعروضون لشعبة محددة</span>
    {% endif %}
</div>

<div class="bg-white rounded-xl shadow overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full text-sm text-right text-gray-500">
            <thead class="text-xs text-gray-700 uppercase bg-gray-50 border-b">
                <tr>
                    <th scope="col" class="px-6 py-3">الاسم الكامل</th>
                    <th scope="col" class="px-6 py-3">اسم المستخدم</th>
                    <th scope="col" class="px-6 py-3">الصف والشعبة</th>
                    <th scope="col" class="px-6 py-3">الحالة (حظر/تفعيل)</th>
                    <th scope="col" class="px-6 py-3">إجراءات</th>
                </tr>
            </thead>
            <tbody id="students-tbody">
                {% include 'school/admin/partials/students_table_rows.html' %}
            </tbody>
        </table>
    </div>
</div>
