<div id="user-status-{{ user_obj.id }}" class="flex items-center gap-3">
    <!-- Badge -->
    {% if user_obj.is_active %}
        <span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            نشط
        </span>
    {% else %}
        <span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
            محظور
        </span>
    {% endif %}

    <!-- Toggle Button -->
    <button hx-post="{% url 'admin_toggle_user_status' user_obj.id %}" 
            hx-target="#user-status-{{ user_obj.id }}" 
            hx-swap="outerHTML"
            class="text-xs font-medium flex items-center gap-1 px-3 py-1 rounded-md transition-colors shadow-sm
            {% if user_obj.is_active %} bg-orange-100 text-orange-700 hover:bg-orange-200 
            {% else %} bg-teal-100 text-teal-700 hover:bg-teal-200 {% endif %}">
        {% if user_obj.is_active %}
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
            حظر
        {% else %}
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            تفعيل
        {% endif %}
    </button>
</div>
