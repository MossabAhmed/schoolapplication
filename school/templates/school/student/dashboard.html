{% extends 'base.html' %}

{% block title %}لوحة تحكم الطالب{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-3xl font-bold text-gray-800">أهلاً بك، {{ user.get_full_name|default:user.username }}</h1>
    <p class="text-gray-600 mt-2">أتمنى لك يوماً دراسياً ممتعاً!</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    <!-- البطاقات الإحصائية (سيتم تغذيتها بالبيانات الفعلية في الخطوة 4) -->
    <div class="bg-white rounded-xl shadow p-6 border-r-4 border-indigo-500">
        <h3 class="text-gray-500 font-semibold mb-1">الواجبات المعلقة</h3>
        <p class="text-3xl font-bold text-gray-800">-</p>
    </div>
    
    <div class="bg-white rounded-xl shadow p-6 border-r-4 border-yellow-500">
        <h3 class="text-gray-500 font-semibold mb-1">أحدث الدرجات</h3>
        <p class="text-3xl font-bold text-gray-800">-</p>
    </div>
</div>
{% endblock %}
