<label for="schedule-select" class="block text-sm font-semibold text-gray-700 mb-2">الحصة / الشعبة</label>
<select id="schedule-select" name="schedule_id" 
        hx-get="{% url 'teacher_get_attendance_list' %}"
        hx-include="#date-select"
        hx-target="#attendance-list-container"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-white">
    <option value="" disabled selected>-- اختر الحصة --</option>
    {% for schedule in schedules %}
        <option value="{{ schedule.id }}" {% if auto_schedule_id|stringformat:"s" == schedule.id|stringformat:"s" %}selected{% endif %}>
            الحصة {{ schedule.period }} - {{ schedule.section.grade.name }} ({{ schedule.section.name }}) - {{ schedule.subject.name }}
        </option>
    {% empty %}
        <option value="" disabled>لا توجد حصص مخصصة لك في هذا اليوم</option>
    {% endfor %}
</select>
